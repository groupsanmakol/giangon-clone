<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tool lấy link Youtube Shopee</title>

<style>
body{
font-family:Arial;
background:#f6f6f6;
padding:40px;
max-width:800px;
margin:auto;
}

.box{
background:white;
padding:24px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:12px;
}

button{
background:#ee4d2d;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:20px;
word-break:break-all;
}

a{
color:#ee4d2d;
}
</style>
</head>
<body>

<div class="box">
<h2>Lấy link Youtube Shopee</h2>

<input
id="inputUrl"
placeholder="Dán link Shopee vào đây..."
/>

<button onclick="convertLink()">
Chuyển đổi
</button>

<div class="result" id="result"></div>
</div>

<script>
async function convertLink() {

  const input = document.getElementById("inputUrl").value;
  const result = document.getElementById("result");

  result.innerHTML = "Đang xử lý...";

  try {

    const res = await fetch(
      "https://TEN-WORKER-CUA-BAN.workers.dev",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          url: input
        })
      }
    );

    const data = await res.json();

    console.log(data);

    const youtubeLink = data?.data?.youtube?.shortLink;

    if (youtubeLink) {
      result.innerHTML = `
        <p>Link Youtube:</p>
        <a href="${youtubeLink}" target="_blank">${youtubeLink}</a>

        <br><br>

        <button onclick="navigator.clipboard.writeText('${youtubeLink}')">
          Copy link
        </button>
      `;
    } else {
      result.innerHTML = "Không lấy được link Youtube";
    }

  } catch (err) {
    console.error(err);
    result.innerHTML = "Lỗi khi gọi API";
  }
}
</script>

</body>
</html>
