<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tool lấy link Youtube Shopee</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f6f6f6;
  max-width:800px;
  margin:auto;
  padding:40px 16px;
}

.box{
  background:#fff;
  padding:24px;
  border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:12px;
}

button{
  background:#ee4d2d;
  color:#fff;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.result{
  margin-top:20px;
  padding:16px;
  background:#fafafa;
  border-radius:10px;
  word-break:break-word;
}
</style>
</head>
<body>

<div class="box">

<h2>Lấy link Youtube Shopee</h2>

<input
  id="inputUrl"
  placeholder="Dán link Shopee vào đây..."
/>

<button onclick="convertLink()" id="convertBtn">
  Chuyển đổi
</button>

<div id="result" class="result"></div>

</div>

<script>
async function copyLink(text){
  await navigator.clipboard.writeText(text);
  alert("Đã copy link");
}

async function convertLink(){

  const input =
    document
      .getElementById("inputUrl")
      .value
      .trim();

  const result =
    document.getElementById("result");

  const btn =
    document.getElementById("convertBtn");

  if(!input){
    result.innerHTML =
      "Vui lòng nhập link Shopee";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Đang xử lý...";
  result.innerHTML = "Đang lấy link...";

  try{

    const response = await fetch(
      "https://lingering-credit-9d02.onedayofu01.workers.dev/",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          url: input
        })
      }
    );

    const data = await response.json();

    console.log(data);

    const youtubeLink =
      data?.data?.youtube?.shortLink ||
      data?.data?.youtube?.link ||
      data?.data?.shortLink ||
      data?.data?.link;

    if(youtubeLink){

      result.innerHTML = `
        <p><b>Lấy link thành công:</b></p>

        <a href="${youtubeLink}" target="_blank">
          ${youtubeLink}
        </a>

        <br><br>

        <button onclick="copyLink('${youtubeLink}')">
          Copy link
        </button>
      `;

    } else {

      result.innerHTML =
        "<pre>" +
        JSON.stringify(data,null,2) +
        "</pre>";
    }

  } catch(err){

    console.error(err);

    result.innerHTML =
      "Lỗi: " + err.message;

  } finally {

    btn.disabled = false;
    btn.innerText = "Chuyển đổi";
  }
}
</script>

</body>
</html>
