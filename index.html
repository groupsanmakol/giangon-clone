<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tool lấy link Youtube Shopee</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>
*{box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#f6f6f6;
max-width:800px;
margin:auto;
padding:40px 16px;
}

.box{
background:#fff;
padding:24px;
border-radius:14px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
}

input{
width:100%;
padding:14px;
font-size:16px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px;
}

button{
background:#ee4d2d;
color:#fff;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:20px;
padding:16px;
background:#fafafa;
border-radius:10px;
word-break:break-word;
}
</style>
</head>
<body>

<div class="box">

<h2>Lấy link Youtube Shopee</h2>

<input
id="inputUrl"
placeholder="Dán link Shopee vào đây..."
>

<button onclick="convertLink()" id="convertBtn">
Chuyển đổi
</button>

<div id="result" class="result"></div>

</div>

<script>
function sha256(text){
  return CryptoJS.SHA256(text)
    .toString(CryptoJS.enc.Hex);
}

function buildHeaders(bodyString){

  const timestamp =
    Date.now().toString();

  const userAgent =
    navigator.userAgent;

  const deviceId =
    crypto.randomUUID();

  const contentSha256 =
    sha256(bodyString);

  return {
    "Content-Type":"application/json",
    "x-timestamp": timestamp,
    "x-user-agent": userAgent,
    "x-device-id": deviceId,
    "x-content-sha256": contentSha256
  };
}

async function copyLink(text){
  await navigator.clipboard.writeText(text);
  alert("Đã copy");
}

async function convertLink(){

  const input =
    document.getElementById("inputUrl")
      .value
      .trim();

  const result =
    document.getElementById("result");

  const btn =
    document.getElementById("convertBtn");

  if(!input){
    result.innerHTML =
      "Vui lòng nhập link";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Đang xử lý...";
  result.innerHTML = "Đang lấy link...";

  try{

    const payload = {
      url: input
    };

    const bodyString =
      JSON.stringify(payload);

    const headers =
      buildHeaders(bodyString);

    const res = await fetch(
      "https://lingering-credit-9d02.onedayofu01.workers.dev/",
      {
        method:"POST",
        headers,
        body: bodyString
      }
    );

    const data = await res.json();

    console.log(data);

    const youtubeLink =
      data?.data?.youtube?.shortLink ||
      data?.data?.youtube?.link ||
      data?.data?.shortLink;

    if(youtubeLink){

      result.innerHTML = `
        <p>Lấy link thành công:</p>

        <a href="${youtubeLink}" target="_blank">
          ${youtubeLink}
        </a>

        <br><br>

        <button onclick="copyLink('${youtubeLink}')">
          Copy link
        </button>
      `;

    }else{

      result.innerHTML =
        "<pre>" +
        JSON.stringify(data,null,2) +
        "</pre>";

    }

  }catch(err){

    console.error(err);

    result.innerHTML =
      "Lỗi: " + err.message;

  }finally{

    btn.disabled = false;
    btn.innerText = "Chuyển đổi";

  }
}
</script>

</body>
</html>
