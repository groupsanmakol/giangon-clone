<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tool lấy link Youtube Shopee</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#f6f7fb;
}

.container{
  max-width:760px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 32px rgba(0,0,0,.08);
}

h2{
  margin-top:0;
  color:#ee4d2d;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border:1px solid #ddd;
  border-radius:12px;
  outline:none;
}

input:focus{
  border-color:#ee4d2d;
}

button{
  background:#ee4d2d;
  color:#fff;
  border:none;
  padding:12px 18px;
  font-size:16px;
  border-radius:12px;
  cursor:pointer;
  margin-top:12px;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.result{
  margin-top:24px;
}

.product{
  background:#fafafa;
  border-radius:14px;
  padding:18px;
}

.product img{
  width:130px;
  border-radius:12px;
  display:block;
  margin-bottom:12px;
}

.linkbox{
  background:#fff;
  border:1px solid #eee;
  padding:12px;
  border-radius:10px;
  word-break:break-all;
  margin:12px 0;
}

.copyBtn{
  background:#222;
}

.error{
  color:#e53935;
  background:#fff1f0;
  padding:14px;
  border-radius:12px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<h2>Lấy link Youtube Shopee</h2>

<input
  id="inputUrl"
  placeholder="Dán link Shopee vào đây..."
/>

<button
  id="convertBtn"
  onclick="convertLink()"
>
  Chuyển đổi
</button>

<div
  id="result"
  class="result"
></div>

</div>

</div>

<script>
const input =
  document.getElementById("inputUrl");

input.addEventListener(
  "keypress",
  function(e){
    if(e.key==="Enter"){
      convertLink();
    }
  }
);

async function copyLink(text){
  try{
    await navigator.clipboard.writeText(text);
    alert("Đã copy link");
  }catch{
    alert("Không copy được");
  }
}

async function convertLink(){

  const url =
    input.value.trim();

  const result =
    document.getElementById("result");

  const btn =
    document.getElementById("convertBtn");

  if(!url){
    result.innerHTML =
      `<div class="error">
        Vui lòng nhập link Shopee
      </div>`;
    return;
  }

  btn.disabled = true;
  btn.innerText = "Đang xử lý...";

  result.innerHTML =
    `Đang lấy dữ liệu...`;

  try{

    const response =
      await fetch(
        "https://lingering-credit-9d02.onedayofu01.workers.dev/",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body: JSON.stringify({
            url:url
          })
        }
      );

    const data =
      await response.json();

    console.log(data);

    const youtubeLink =
      data?.data?.youtube?.shortLink;

    const title =
      data?.data?.productDetails?.title;

    const image =
      data?.data?.productDetails?.thumbnailUrl;

    if(youtubeLink){

      result.innerHTML = `
        <div class="product">

          ${
            image
              ? `<img src="${image}" alt="">`
              : ""
          }

          <h3>${title || "Sản phẩm Shopee"}</h3>

          <div class="linkbox">
            <a
              href="${youtubeLink}"
              target="_blank"
            >
              ${youtubeLink}
            </a>
          </div>

          <button
            class="copyBtn"
            onclick="copyLink('${youtubeLink}')"
          >
            Copy link
          </button>

        </div>
      `;

    } else {

      result.innerHTML = `
        <div class="error">
          Không lấy được link Youtube cho sản phẩm này
        </div>
      `;
    }

  } catch(err){

    console.error(err);

    result.innerHTML = `
      <div class="error">
        Lỗi:
        ${err.message}
      </div>
    `;

  } finally {

    btn.disabled = false;
    btn.innerText = "Chuyển đổi";
  }
}
</script>

</body>
</html>
